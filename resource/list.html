<!DOCTYPE html>
<html lang="en">

<head>
    {{.HeadMetadata}}
</head>

<body>
    {{.Header}}
    <div class="page">
        <ul class="posts">
            {{range .Pages}}
            <li>
                <a href="/{{.Url}}">
                    <h2>{{.Title}}</h2>
                </a>
                <span class="publish-date">Published on: {{.Date}}</span>
            </li>
            {{end}}
        </ul>
      {{.Footer}}
    </div>
</body>

</html>
